name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v6
        with:
          python-version: "3.12"

      - name: Install from lock
        run: uv sync --locked

      - name: Lint (ruff)
        run: uv run ruff check orchestrator tests

      - name: Tests (pytest)
        run: uv run python -m pytest
